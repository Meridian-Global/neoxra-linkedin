<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Orchestra LinkedIn</title>
    <link rel="stylesheet" href="./popup.css" />
    <script src="../../config/config.js"></script>
    <script src="../api/orchestraClient.js"></script>
  </head>
  <body>
    <main class="popup-shell">
      <header class="popup-header">
        <div>
          <p class="eyebrow">AI Writing Assistant</p>
          <h1>Orchestra</h1>
          <p class="subtitle">LinkedIn</p>
        </div>
        <p class="header-copy">
          Turn a rough idea into a polished LinkedIn draft you can review and insert.
        </p>
      </header>

      <section class="panel input-section">
        <div class="section-heading">
          <p class="section-label">Input</p>
          <p class="section-copy">Start with a topic, opinion, or rough post idea.</p>
        </div>
        <textarea
          id="idea-input"
          placeholder="What's your idea?"
        ></textarea>
        <button id="generate-btn" class="primary-button" type="button">
          <span class="button-text">Generate Post</span>
        </button>
      </section>

      <div id="status-text" class="status-banner hidden" aria-live="polite"></div>

      <section id="result-section" class="panel result-panel hidden">
        <div class="section-heading">
          <p class="section-label">Output</p>
          <p class="section-copy">Review the generated draft before sending it to LinkedIn.</p>
        </div>
        <textarea id="result-text" readonly></textarea>
        <div class="action-group">
          <button id="insert-btn" class="secondary-button" type="button">Insert into Post</button>
          <button id="regenerate-btn" class="tertiary-button" type="button">Generate Again</button>
        </div>
      </section>

      <div id="error-text" class="error-banner hidden" aria-live="polite"></div>
    </main>

    <script src="./popup.js"></script>
  </body>
</html>
